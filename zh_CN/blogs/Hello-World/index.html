                    <div class="post-info">

                    </div>
                    <div class="post-content">
                        <p>大多数语言的第一课大概都会是“Hello World!”吧，所以，我也从此开始记录生活，记录我的独白。或许这是为了能在纷繁复杂、兵荒马乱的岁月里，停下来，给自己一面镜子，映出那些终将遗失的美好，那些轻易忘记的丑陋。</p>
<p>世界，你好！</p>
